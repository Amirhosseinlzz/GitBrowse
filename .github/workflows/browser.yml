name: 🌐 Browse the Web

run-name: 🌐 Browse ${{ inputs.url }}

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to visit'
        required: true
        type: string
      automation:
        description: 'Optional JSON automation steps. Example: [{"action":"click","selector":"button.load-more"},{"action":"wait","ms":2000}]'
        required: false
        default: '[]'
        type: string
      popup_rules:
        description: 'Optional JSON popup rules for cookie/age modals. User rules run before built-in rules.'
        required: false
        default: '[]'
        type: string
      session_key:
        description: 'Optional session name. Empty = domain-based session file under sessions/<domain>.json'
        required: false
        default: ''
        type: string
      wait_after_load:
        description: 'Seconds to wait after page load and after automation before capture'
        required: false
        default: '2'
        type: string
      auto_scroll:
        description: 'Scroll the page before capture to trigger lazy-loaded images/Ajax'
        required: false
        default: true
        type: boolean
      persist_session:
        description: 'Save/reuse cookies + localStorage + sessionStorage in the repository'
        required: false
        default: true
        type: boolean
      save_response_bodies:
        description: 'Save textual response bodies for Ajax/fetch/document/script/stylesheet requests'
        required: false
        default: true
        type: boolean
      max_response_body_mb:
        description: 'Maximum saved size per textual network response body'
        required: false
        default: '2'
        type: string
      max_asset_size_mb:
        description: 'Maximum downloaded size per offline asset. Videos are skipped by default.'
        required: false
        default: '25'
        type: string
      include_videos:
        description: 'Download video assets too. Usually keep false to avoid huge repository size.'
        required: false
        default: false
        type: boolean
      redact_sensitive:
        description: 'Redact Cookie/Authorization-like headers in network logs. Keep false for full logs.'
        required: false
        default: false
        type: boolean
      proxy_mode:
        description: 'Proxy mode: none/manual/fastest-from-file/rank-from-file/random-from-file'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - manual
          - fastest-from-file
          - rank-from-file
          - random-from-file
      proxy_server:
        description: 'Manual proxy server. Example: http://IP:PORT or socks5://IP:PORT. Empty = use PROXY_SERVER secret when proxy_mode=manual.'
        required: false
        default: ''
        type: string
      proxy_username:
        description: 'Manual proxy username. Prefer GitHub secret PROXY_USERNAME for private proxies.'
        required: false
        default: ''
        type: string
      proxy_password:
        description: 'Manual proxy password. Prefer GitHub secret PROXY_PASSWORD for private proxies.'
        required: false
        default: ''
        type: string
      proxy_list_file:
        description: 'Proxy list file generated by workflow 05. Usually proxy-list.json or proxy-list.md.'
        required: false
        default: 'proxy-list.json'
        type: string
      proxy_list_rank:
        description: 'Proxy rank when proxy_mode=rank-from-file. 1 = fastest row in proxy-list.json.'
        required: false
        default: '1'
        type: string
      proxy_allow_direct_fallback:
        description: 'If selected proxy is invalid/unavailable, continue without proxy instead of failing early.'
        required: false
        default: false
        type: boolean
      max_part_size_mb:
        description: 'When the capture zip is larger than this (MB), split into parts before push. Use ≤99 for GitHub 100 MB limit.'
        required: false
        default: '50'
        type: string

concurrency:
  group: browser-${{ github.ref }}
  cancel-in-progress: false

jobs:
  browse:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-browser.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          python -m pip install --upgrade pip
          pip install -r requirements-browser.txt
          python -m playwright install --with-deps chromium

      - name: Run browser capture
        env:
          BROWSER_URL: ${{ inputs.url }}
          AUTOMATION_JSON: ${{ inputs.automation }}
          POPUP_RULES_JSON: ${{ inputs.popup_rules }}
          SESSION_KEY: ${{ inputs.session_key }}
          WAIT_AFTER_LOAD: ${{ inputs.wait_after_load }}
          AUTO_SCROLL: ${{ inputs.auto_scroll }}
          PERSIST_SESSION: ${{ inputs.persist_session }}
          SAVE_RESPONSE_BODIES: ${{ inputs.save_response_bodies }}
          MAX_RESPONSE_BODY_MB: ${{ inputs.max_response_body_mb }}
          MAX_ASSET_SIZE_MB: ${{ inputs.max_asset_size_mb }}
          REDACT_SENSITIVE: ${{ inputs.redact_sensitive }}
          INCLUDE_VIDEOS: ${{ inputs.include_videos }}
          PROXY_MODE: ${{ inputs.proxy_mode }}
          PROXY_SERVER: ${{ inputs.proxy_server }}
          PROXY_USERNAME: ${{ inputs.proxy_username }}
          PROXY_PASSWORD: ${{ inputs.proxy_password }}
          PROXY_SERVER_SECRET: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME_SECRET: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD_SECRET: ${{ secrets.PROXY_PASSWORD }}
          PROXY_LIST_FILE: ${{ inputs.proxy_list_file }}
          PROXY_LIST_RANK: ${{ inputs.proxy_list_rank }}
          PROXY_ALLOW_DIRECT_FALLBACK: ${{ inputs.proxy_allow_direct_fallback }}
        run: |
          python scripts/browser_capture.py

      - name: Create zip archive of capture folder
        if: always()
        env:
          MAX_PART_SIZE_MB_INPUT: ${{ inputs.max_part_size_mb }}
        run: |
          set -euo pipefail

          if [ -z "${BROWSER_OUTPUT_DIR:-}" ] || [ ! -d "$BROWSER_OUTPUT_DIR" ]; then
            echo "No browser output folder found."
            exit 0
          fi

          MAX_PART_RAW="${MAX_PART_SIZE_MB_INPUT:-50}"
          if [ -z "$MAX_PART_RAW" ]; then
            MAX_GITHUB_FILE_MB=50
          elif echo "$MAX_PART_RAW" | grep -Eq '^[0-9]+$' && [ "$MAX_PART_RAW" -gt 0 ] 2>/dev/null; then
            MAX_GITHUB_FILE_MB="$MAX_PART_RAW"
            if [ "$MAX_GITHUB_FILE_MB" -gt 99 ]; then
              echo "max_part_size_mb capped at 99 (GitHub rejects blobs ≥100 MB)."
              MAX_GITHUB_FILE_MB=99
            fi
          else
            echo "Invalid max_part_size_mb: $MAX_PART_RAW (use a positive integer)."
            exit 1
          fi
          echo "Split threshold if zip exceeds limit: ${MAX_GITHUB_FILE_MB} MB per part"

          ZIP_PATH="$BROWSER_OUTPUT_DIR.zip"

          zip -r "$ZIP_PATH" "$BROWSER_OUTPUT_DIR"

          ZIP_SIZE_BYTES="$(stat -c%s "$ZIP_PATH")"
          MAX_BYTES=$((MAX_GITHUB_FILE_MB * 1024 * 1024))

          if [ "$ZIP_SIZE_BYTES" -gt "$MAX_BYTES" ]; then
            echo "Zip is larger than ${MAX_GITHUB_FILE_MB}MB. Splitting before commit..."
            SPLIT_PREFIX="${ZIP_PATH%.zip}.part."
            split -d -a 2 --numeric-suffixes=1 -b "${MAX_GITHUB_FILE_MB}m" "$ZIP_PATH" "$SPLIT_PREFIX"
            rm -f "$ZIP_PATH"

            for PART_FILE in "${SPLIT_PREFIX}"*; do
              PART_SUFFIX="${PART_FILE##*.}"
              mv "$PART_FILE" "${SPLIT_PREFIX}${PART_SUFFIX}.zip"
            done

            ls -lah "${ZIP_PATH%.zip}.part."*.zip
          else
            echo "Zip size is within GitHub limit. Keeping single zip file."
            ls -lah "$ZIP_PATH"
          fi

      - name: Upload capture as GitHub Actions artifact
        if: always() && env.BROWSER_OUTPUT_DIR != ''
        uses: actions/upload-artifact@v4
        with:
          name: browser-capture-${{ env.BROWSER_DOMAIN }}-${{ env.BROWSER_TIMESTAMP }}
          path: |
            ${{ env.BROWSER_OUTPUT_DIR }}
            ${{ env.BROWSER_OUTPUT_DIR }}.zip
            ${{ env.BROWSER_OUTPUT_DIR }}.part.*.zip
          if-no-files-found: ignore

      - name: Commit and push results
        if: always() && env.BROWSER_OUTPUT_DIR != ''
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A pages browse.md sessions
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Saved browser capture for $BROWSER_DOMAIN [skip ci]"
          git pull --rebase
          git push
