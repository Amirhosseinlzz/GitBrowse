name: 🗑 Clean generated folders

on:
  workflow_dispatch:
    inputs:
      warning:
        description: '⚠️ WARNING: This will DELETE generated data in downloads/, pages/, sessions/ and browse.md.'
        required: false
        default: 'Read this warning before proceeding'

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove generated folders and recreate base structure
        run: |
          rm -rf downloads
          rm -rf pages
          rm -rf sessions
          rm -f browse.md
          mkdir -p downloads
          mkdir -p pages
          mkdir -p sessions

      - name: Commit and push cleaned repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A downloads pages sessions browse.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Clean generated browser and download artifacts [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin HEAD:"${{ github.ref_name }}"
            echo "✅ downloads/pages/sessions/browse.md cleaned"
          fi
