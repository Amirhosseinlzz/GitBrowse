name: 🧭 Collect Free Proxies

run-name: 🧭 Collect ${{ inputs.count }} fast ${{ inputs.protocol }} proxies

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'How many fastest working proxies should be saved?'
        required: false
        default: '10'
        type: string
      protocol:
        description: 'Proxy protocol to collect and test'
        required: false
        default: 'http'
        type: choice
        options:
          - http
          - https
          - socks4
          - socks5
          - all
      test_url:
        description: 'URL used for latency/working test. For target-specific proxies, put the blocked website URL here.'
        required: false
        default: 'https://api.ipify.org?format=json'
        type: string
      timeout_seconds:
        description: 'Timeout for each proxy test request'
        required: false
        default: '8'
        type: string
      concurrency:
        description: 'How many proxies to test in parallel'
        required: false
        default: '80'
        type: string
      max_candidates:
        description: 'Maximum collected candidates to test. Increase for more chance; decrease for faster runs.'
        required: false
        default: '1200'
        type: string
      sources_file:
        description: 'Optional custom source file. Example: proxy-sources.example.txt. Empty = built-in free sources.'
        required: false
        default: ''
        type: string

concurrency:
  group: proxy-list-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect-proxies:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-browser.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-browser.txt

      - name: Collect and test free proxies
        env:
          PROXY_COUNT: ${{ inputs.count }}
          PROXY_PROTOCOL: ${{ inputs.protocol }}
          PROXY_TEST_URL: ${{ inputs.test_url }}
          PROXY_TEST_TIMEOUT: ${{ inputs.timeout_seconds }}
          PROXY_CONCURRENCY: ${{ inputs.concurrency }}
          PROXY_MAX_CANDIDATES: ${{ inputs.max_candidates }}
          PROXY_SOURCES_FILE: ${{ inputs.sources_file }}
        run: |
          extra_args=()
          if [ -n "${PROXY_SOURCES_FILE:-}" ]; then
            extra_args+=(--sources-file "$PROXY_SOURCES_FILE")
          fi
          python scripts/proxy_collector.py "${extra_args[@]}"

      - name: Add proxy list to run summary
        if: always() && hashFiles('proxy-list.md') != ''
        run: |
          cat proxy-list.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload proxy list artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proxy-list
          path: |
            proxy-list.md
            proxy-list.json
            proxy-list.env
          if-no-files-found: ignore

      - name: Commit and push proxy list
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A proxy-list.md proxy-list.json proxy-list.env
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Update tested proxy list [skip ci]"
          git pull --rebase
          git push
